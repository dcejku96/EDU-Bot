<!doctype html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edu-bot — Asistenti Mësimor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  :root {
    --gold:       #C9A733;
    --gold-dark:  #A88620;
    --gold-light: #F5E9B8;
    --blue-msg:   #1B3A8C;
    --cream:      #F3F1E6;
    --cream-dark: #E8E3D0;
    --paper:      #FAFAF7;
    --ink:        #1A2010;
    --ink-mid:    #4A5240;
    --ink-dim:    #8A9280;
    --green:      #2E7D32;
    --red:        #C62828;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    background: var(--paper);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Navbar ── */
  .navbar-edu {
    background: var(--gold);
    border-bottom: 2px solid var(--gold-dark);
    height: 82px;
    flex-shrink: 0;
  }
  .navbar-edu .brand-title {
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    line-height: 1;
  }
  .navbar-edu .brand-sub {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    margin-top: 2px;
  }
  .logo-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--gold-light);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .logo-circle img { width: 100px; height: 100px; object-fit: contain; }

  /* ── Butoni Quiz mobile ── */
  .btn-quiz-mob {
    background: rgba(0,0,0,0.12);
    border: none; border-radius: 8px;
    padding: 7px 12px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--ink); cursor: pointer; white-space: nowrap;
  }

  /* ── Sidebar ── */
  .sidebar-desktop {
    width: 210px; flex-shrink: 0;
    background: var(--cream);
    border-right: 1px solid var(--cream-dark);
    padding: 50px 14px 20px;
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 13px; font-weight: 700;
    color: var(--gold-dark); margin-bottom: 12px; letter-spacing: .5px;
  }
  .fac-btn {
    display: block; width: 100%; text-align: left;
    background: transparent; border: none; border-radius: 10px;
    padding: 10px 12px; font-family: inherit; font-size: 13px;
    color: var(--ink-mid); cursor: pointer; transition: .2s ease;
  }
  .fac-btn:hover { background: var(--cream-dark); transform: translateX(2px); }
  .fac-btn.active { background: var(--gold); color: black; font-weight: 600; }

  /* Mobile sidebar horizontal */
  .sidebar-mobile {
    background: var(--cream);
    border-bottom: 1px solid var(--cream-dark);
    padding: 8px;
    display: flex; gap: 6px;
    overflow-x: auto; flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .sidebar-mobile::-webkit-scrollbar { display: none; }
  .sidebar-mobile .fac-btn {
    white-space: nowrap; width: auto;
    padding: 7px 11px; font-size: 12px; flex-shrink: 0;
    transform: none !important;
  }

  /* ── Chat ── */
  .chat-area {
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 14px;
    background: var(--paper);
  }
  .welcome {
    margin: 60px auto 0; max-width: 460px; text-align: center;
    background: white; border: 1px solid var(--cream-dark);
    border-top: 3px solid var(--gold); border-radius: 12px; padding: 28px 24px;
  }
  .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .welcome p  { font-size: 15px; color: var(--ink-mid); line-height: 1.6; }

  .msg-row { display: flex; align-items: flex-start; gap: 8px; animation: fadeUp .2s ease; }
  .msg-row.user  { justify-content: flex-end; }
  .msg-row.tutor { justify-content: flex-start; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(5px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .step-badge {
    width: 24px; height: 24px; flex-shrink: 0; border-radius: 50%;
    background: var(--gold); color: var(--ink);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 3px;
  }
  .bubble {
    max-width: 72%; padding: 10px 14px;
    font-size: 14px; line-height: 1.55;
    white-space: pre-wrap; word-break: break-word;
  }
  .bubble.user-bubble  { background: var(--blue-msg); color: white; border-radius: 14px 14px 4px 14px; }
  .bubble.tutor-bubble { background: white; color: var(--ink); border: 1px solid var(--cream-dark); border-left: 3px solid var(--gold); border-radius: 0 12px 12px 0; }
  .bubble.error-bubble { background: #FEF0ED; color: #8B2500; border: 1px solid #F5C4B3; border-radius: 10px; }

  .typing-bubble {
    background: white; border: 1px solid var(--cream-dark);
    border-left: 3px solid var(--gold); border-radius: 0 12px 12px 0;
    padding: 12px 16px; display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-dim); animation: bounce 1.2s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); opacity:.4; }
    40%          { transform:translateY(-5px); opacity:1; }
  }

  /* ── Composer ── */
  .composer {
    display: flex; gap: 10px; align-items: flex-end;
    padding: 16px 28px 22px;
    border-top: 1px solid var(--cream-dark);
    background: var(--cream); flex-shrink: 0;
  }
  .composer textarea {
    flex: 1; font-family: inherit; font-size: 16px;
    padding: 13px 15px;
    border: 1px solid var(--cream-dark); border-radius: 10px;
    background: white; color: var(--ink);
    resize: none; max-height: 150px; transition: border-color .15s;
  }
  .composer textarea:focus   { outline: none; border-color: var(--gold); }
  .composer textarea:disabled { color: var(--ink-dim); background: var(--paper); }
  .send-btn {
    background: var(--gold); color: var(--ink); border: none; border-radius: 10px;
    padding: 13px 22px; font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; flex-shrink: 0; transition: background .15s;
  }
  .send-btn:hover:not(:disabled) { background: var(--gold-dark); }
  .send-btn:disabled { background: var(--cream-dark); color: var(--ink-dim); cursor: not-allowed; }

  /* ── Quiz sidebar ── */
  #quizSidebar {
    width: 340px; flex-shrink: 0;
    background: var(--cream);
    border-left: 1px solid var(--cream-dark);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .quiz-header-inner {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--cream-dark);
    display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
  }
  .quiz-title-row { display: flex; align-items: center; justify-content: space-between; }
  .quiz-title { font-size: 13px; font-weight: 700; color: var(--gold-dark); letter-spacing: .5px; margin: 0; }
  .btn-close-quiz {
    background: var(--cream-dark); border: none; border-radius: 50%;
    width: 30px; height: 30px;
    display: none; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer; color: var(--ink);
  }
  .quiz-gen-btn {
    background: var(--gold); color: var(--ink); border: none; border-radius: 8px;
    padding: 9px 14px; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; width: 100%; transition: background .15s;
  }
  .quiz-gen-btn:hover:not(:disabled) { background: var(--gold-dark); }
  .quiz-gen-btn:disabled { background: var(--cream-dark); color: var(--ink-dim); cursor: not-allowed; }

  .quiz-scroll {
    flex: 1; overflow-y: auto;
    padding: 14px 14px 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .quiz-empty {
    margin-top: 40px; text-align: center;
    color: var(--ink-dim); font-size: 13px; line-height: 1.6; padding: 0 10px;
  }
  .quiz-loading { text-align: center; color: var(--ink-dim); font-size: 13px; padding: 20px 0; }
  .quiz-score-bar {
    background: white; border: 1px solid var(--cream-dark);
    border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0;
    padding: 8px 12px; font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .q-card { background: white; border: 1px solid var(--cream-dark); border-radius: 10px; padding: 12px; font-size: 13px; }
  .q-text { font-weight: 600; color: var(--ink); margin-bottom: 10px; line-height: 1.45; }
  .q-opt {
    display: block; width: 100%; text-align: left;
    background: var(--cream); border: 1px solid var(--cream-dark);
    border-radius: 6px; padding: 7px 10px; margin-bottom: 6px;
    font-family: inherit; font-size: 12px; color: var(--ink-mid);
    cursor: pointer; transition: background .15s, border-color .15s;
  }
  .q-opt:last-child { margin-bottom: 0; }
  .q-opt:hover:not(:disabled) { background: var(--gold-light); border-color: var(--gold); }
  .q-opt.correct { background: #E8F5E9; border-color: var(--green); color: var(--green); font-weight: 600; }
  .q-opt.wrong   { background: #FFEBEE; border-color: var(--red);   color: var(--red);   font-weight: 600; }
  .q-opt:disabled { cursor: default; }

  /* ── Mobile ── */
  @media (max-width: 767px) {
    .chat-area { padding: 14px; }
    .composer  { padding: 10px 12px 14px; }
    .bubble    { max-width: 86%; }

    #quizSidebar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1055;
      width: 100%;
      background: var(--cream);
      flex-direction: column;
      overflow: hidden;
    }
    #quizSidebar.open { display: flex; }
    .btn-close-quiz   { display: flex; }
  }

  @media (min-width: 768px) {
    .btn-quiz-mob { display: none !important; }
  }
</style>
</head>
<body class="d-flex flex-column">

<!-- NAVBAR -->
<nav class="navbar-edu d-flex align-items-center justify-content-between px-4">
  <div>
    <div class="brand-title">EDU Bot</div>
    <div class="brand-sub">Ndihmësi juaj për studime</div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <button class="btn-quiz-mob" onclick="hapKuizin()">📝 Kuiz</button>
    <div class="logo-circle">
      <img src="/static/UPZ_logo.png" alt="Logo UPZ">
    </div>
  </div>
</nav>

<!-- BODY -->
<div class="d-flex flex-grow-1 overflow-hidden">

  <!-- Sidebar desktop -->
  <nav class="sidebar-desktop d-none d-md-flex flex-column">
    <p class="sidebar-label">Fakultetet</p>
    <button class="fac-btn" data-faculty="cs">Fakulteti i Shkencave Kompjuterike</button>
    <button class="fac-btn" data-faculty="ekonomi">Fakulteti Ekonomik</button>
    <button class="fac-btn" data-faculty="education">Fakulteti i Edukimit</button>
    <button class="fac-btn" data-faculty="philology">Fakulteti i Filologjisë</button>
    <button class="fac-btn" data-faculty="life_sciences">Fakulteti i Shkencave të Jetës dhe Mjedisit</button>
    <button class="fac-btn" data-faculty="law">Fakulteti Juridik</button>
  </nav>

  <!-- Chat + mobile sidebar -->
  <div class="d-flex flex-column flex-grow-1 overflow-hidden">

    <!-- Sidebar mobile -->
    <nav class="sidebar-mobile d-md-none">
      <button class="fac-btn" data-faculty="cs">Fakulteti i Shkencave Kompjuterike</button>
      <button class="fac-btn" data-faculty="ekonomi">Fakulteti Ekonomik</button>
      <button class="fac-btn" data-faculty="education">Fakulteti i Edukimit</button>
      <button class="fac-btn" data-faculty="philology">Fakulteti i Filologjisë</button>
      <button class="fac-btn" data-faculty="life_sciences">Fakulteti i Shkencave të Jetës dhe Mjedisit</button>
      <button class="fac-btn" data-faculty="law">Fakulteti Juridik</button>
    </nav>

    <!-- Chat panel -->
    <main class="d-flex flex-column flex-grow-1 overflow-hidden">
      <div class="chat-area" id="chatScroll">
        <div class="welcome">
          <h2>Mirë se vjen!</h2><br>
          <p>EDU Bot është asistenti yt i të mësuarit <br><br>
            Zgjidh fakultetin, shkruaj pyetjen dhe fillo mësimin hap pas hapi.</p>
        </div>
      </div>
      <form class="composer" id="composerForm">
        <textarea id="msgInput" rows="2"
          placeholder="Zgjedh fillimisht një fakultet..."
          disabled></textarea>
        <button class="send-btn" id="sendBtn" type="submit" disabled>Dërgo</button>
      </form>
    </main>
  </div>

  <!-- Quiz sidebar -->
  <aside id="quizSidebar">
    <div class="quiz-header-inner">
      <div class="quiz-title-row">
        <p class="quiz-title">📝 KUIZ</p>
        <button class="btn-close-quiz" onclick="mbyllKuizin()">✕</button>
      </div>
      <button class="quiz-gen-btn" id="quizGenBtn" disabled>
        Gjenero Kuiz nga Biseda
      </button>
    </div>
    <div class="quiz-scroll" id="quizScroll">
      <div class="quiz-empty" id="quizEmpty">
        Pasi te fillosh mesimin me EDU Bot-in, mund te gjenerosh kuiz.
      </div>
      <div class="quiz-loading" id="quizLoading" style="display:none;">
        ⏳ Duke gjeneruar kuizin...
      </div>
      <div class="quiz-score-bar" id="quizScoreBar" style="display:none;"></div>
    </div>
  </aside>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let history   = [];
  let stepCount = 0;
  let busy      = false;
  let quizBusy  = false;

  const chatScroll   = document.getElementById("chatScroll");
  const composerForm = document.getElementById("composerForm");
  const msgInput     = document.getElementById("msgInput");
  const sendBtn      = document.getElementById("sendBtn");
  const facBtns      = document.querySelectorAll(".fac-btn");
  const quizGenBtn   = document.getElementById("quizGenBtn");
  const quizScroll   = document.getElementById("quizScroll");
  const quizEmpty    = document.getElementById("quizEmpty");
  const quizLoading  = document.getElementById("quizLoading");
  const quizScoreBar = document.getElementById("quizScoreBar");

  facBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      if (busy) return;
      history   = [];
      stepCount = 0;
      facBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      msgInput.disabled = false;
      msgInput.placeholder = "Shkruaj pyetjen tënde...";
      sendBtn.disabled = false;
      quizGenBtn.disabled = true;
      resetQuiz();
      renderMessages();
      msgInput.focus();
    });
  });

  composerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text    = msgInput.value.trim();
    const faculty = document.querySelector(".fac-btn.active")?.dataset.faculty;
    if (!text || busy || !faculty) return;

    history.push({ role: "user", content: text });
    msgInput.value = "";
    msgInput.style.height = "auto";
    renderMessages();
    showTyping();
    setBusy(true);

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ faculty, history })
      });
      const data = await res.json();
      hideTyping();
      if (!res.ok) {
        appendError(data.error || "Diçka shkoi gabim.");
      } else {
        history.push({ role: "assistant", content: data.reply });
        renderMessages();
        if (history.length >= 2) quizGenBtn.disabled = false;
      }
    } catch {
      hideTyping();
      appendError("Nuk mund të lidhem me serverin. Provo përsëri.");
    }

    setBusy(false);
    msgInput.focus();
  });

  quizGenBtn.addEventListener("click", async () => {
    if (quizBusy || history.length < 2) return;
    quizBusy = true;
    quizGenBtn.disabled = true;
    resetQuiz();
    quizLoading.style.display = "block";

    try {
      const res  = await fetch("/quiz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      quizLoading.style.display = "none";

      if (!res.ok) {
        quizEmpty.textContent = data.error || "Gabim gjatë gjenerimit.";
        quizEmpty.style.display = "block";
      } else {
        renderQuiz(data.questions);
      }
    } catch {
      quizLoading.style.display = "none";
      quizEmpty.textContent = "Nuk mund të lidhem me serverin.";
      quizEmpty.style.display = "block";
    }

    quizBusy = false;
    quizGenBtn.disabled = false;
  });

  function renderQuiz(questions) {
    quizEmpty.style.display = "none";
    quizScoreBar.style.display = "none";
    document.querySelectorAll(".q-card").forEach(el => el.remove());

    let score = 0;
    let answered = 0;
    const total = questions.length;

    questions.forEach((q, qi) => {
      const card = mk("div", "q-card");

      const qText = mk("p", "q-text");
      qText.textContent = `${qi + 1}. ${q.pyetja}`;
      card.appendChild(qText);

      q.alternativat.forEach(alt => {
        const letter = alt.charAt(0);
        const btn = mk("button", "q-opt");
        btn.textContent = alt;

        btn.addEventListener("click", () => {
          card.querySelectorAll(".q-opt").forEach(b => b.disabled = true);

          if (letter === q.e_sakta) {
            btn.classList.add("correct");
            score++;
          } else {
            btn.classList.add("wrong");
            card.querySelectorAll(".q-opt").forEach(b => {
              if (b.textContent.charAt(0) === q.e_sakta) b.classList.add("correct");
            });
          }

          answered++;
          if (answered === total) {
            quizScoreBar.textContent = `Rezultati: ${score} / ${total} të sakta ✅`;
            quizScoreBar.style.display = "block";
            quizScroll.scrollTop = 0;
          }
        });

        card.appendChild(btn);
      });

      quizScroll.appendChild(card);
    });
  }

  function resetQuiz() {
    document.querySelectorAll(".q-card").forEach(el => el.remove());
    quizEmpty.style.display = "block";
    quizEmpty.textContent = "Pasi te fillosh mesimin me EDU Bot-in, mund te gjenerosh kuiz.";
    quizScoreBar.style.display = "none";
    quizLoading.style.display = "none";
  }

  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + "px";
  });

  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      composerForm.requestSubmit();
    }
  });

  function renderMessages() {
    chatScroll.innerHTML = "";
    stepCount = 0;
    if (history.length === 0) {
      chatScroll.innerHTML = `
        <div class="welcome">
          <h2>Fakulteti i zgjedhur!</h2>
          <p>Shkruaj pyetjen ose ushtrimin tënd poshtë.<br>
             Tutori do të të udhëheqë hap pas hapi.</p>
        </div>`;
      return;
    }
    history.forEach(msg => {
      if (msg.role === "user") {
        const row = mk("div","msg-row user");
        const b   = mk("div","bubble user-bubble");
        b.textContent = msg.content;
        row.appendChild(b);
        chatScroll.appendChild(row);
      } else {
        stepCount++;
        const row   = mk("div","msg-row tutor");
        const badge = mk("div","step-badge");
        badge.textContent = stepCount;
        const b = mk("div","bubble tutor-bubble");
        b.textContent = msg.content;
        row.appendChild(badge);
        row.appendChild(b);
        chatScroll.appendChild(row);
      }
    });
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function showTyping() {
    const row   = mk("div","msg-row tutor"); row.id = "typingRow";
    const badge = mk("div","step-badge"); badge.textContent = stepCount + 1;
    const tb    = mk("div","typing-bubble");
    tb.innerHTML = "<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
    row.appendChild(badge); row.appendChild(tb);
    chatScroll.appendChild(row);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function hideTyping() { const r = document.getElementById("typingRow"); if (r) r.remove(); }

  function appendError(text) {
    const row = mk("div","msg-row tutor");
    const b   = mk("div","bubble error-bubble");
    b.textContent = text;
    row.appendChild(b); chatScroll.appendChild(row);
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function setBusy(val) { busy = val; sendBtn.disabled = val; msgInput.disabled = val; }
  function mk(tag,cls)  { const el = document.createElement(tag); if(cls) el.className=cls; return el; }

  window.hapKuizin  = () => document.getElementById("quizSidebar").classList.add("open");
  window.mbyllKuizin = () => document.getElementById("quizSidebar").classList.remove("open");
</script>
</body>
</html>
